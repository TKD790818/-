      url: https://tw.stock.yahoo.com/rss?category=tw-market
    - name: Yahoo股市-最新新聞
      url: https://tw.stock.yahoo.com/rss?category=news
    - name: 中央社-產經證券
      url: https://feeds.feedburner.com/rsscna/finance

sentiment:
  max_items_per_source: 50
  request_timeout: 15

features:
  horizon_days: 1
  benchmark_column: benchmark_close

model:
  type: random_forest
  candidates:
    - random_forest
    - extra_trees
    - gradient_boosting
    # 若已安裝 `pip install -e ".[boosting]"`，可解除下列註解納入比較
    # - lightgbm
    # - xgboost
  selection_metric: roc_auc
  test_size: 0.2
  model_path: artifacts/model.joblib
  random_state: 42
  buy_threshold: 0.58
  sell_threshold: 0.42

risk:
  capital: 1000000
  risk_per_trade: 0.01
  max_position_pct: 0.2
  lot_size: 1000
  atr_stop_multiplier: 2.0
  take_profit_r_multiple: 2.0

backtest:
  initial_capital: 1000000
  annual_trading_days: 252
  cost_rate: 0.0015

telegram:
  enabled: true
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

schedule:
  intraday:
    enabled: true
    start: "09:05"
    end: "13:25"
    interval_minutes: 30
    daytrade_limit: 50
  after_close:
    enabled: true
    time: "14:30"
  evening_notify:
    enabled: true
    time: "20:30"
